spring.application.name=AxisGarage

# ===============================
# CONEXION A MARIADB
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ===============================
# JPA / HIBERNATE
# ===============================
# No modifica el esquema automaticamente
spring.jpa.hibernate.ddl-auto=none
# Dialecto correcto para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Naming strategy (camelCase -> snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Mostrar SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# INICIALIZACION DE BD
# ===============================
# Ejecuta schema.sql y data.sql
spring.sql.init.mode=always
# IMPORTANTE: Que espere a que Hibernate termine de crear las tablas antes de ejecutar el data.sql
spring.jpa.defer-datasource-initialization=true

# ===============================
# HIKARI (POOL DE CONEXIONES)
# ===============================
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.jdbc.datasource.DataSourceTransactionManager=DEBUG

# ===============================
# ENCODING
# ===============================
spring.messages.encoding=UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true

# ===============================
# MULTIPART (SUBIDA DE ARCHIVOS)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


upload.path=${UPLOAD_PATH}

# JWT Configuration
jwt.secret=${JWT_SECRET}

# ===============================
# JWT KEYSTORE CONFIGURATION
# ===============================
jwt.keystore.location=classpath:jwt-keystore.jks
jwt.keystore.password=changeit
jwt.keystore.alias=jwt-keypair

cors.allowed.origins=${CORS_ALLOWED_ORIGINS}