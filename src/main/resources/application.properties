spring.application.name=AxisGarage

# ===============================
# CONEXION A MARIADB
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ===============================
# JPA / HIBERNATE
# ===============================
# No modifica el esquema automaticamente
spring.jpa.hibernate.ddl-auto=none
# Dialecto correcto para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Naming strategy (camelCase -> snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Mostrar SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# INICIALIZACION DE BD
# ===============================
# Ejecuta schema.sql y data.sql
spring.sql.init.mode=always
# IMPORTANTE: Que espere a que Hibernate termine de crear las tablas antes de ejecutar el data.sql
spring.jpa.defer-datasource-initialization=true

# ===============================
# HIKARI (POOL DE CONEXIONES)
# ===============================
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.jdbc.datasource.DataSourceTransactionManager=DEBUG

# ===============================
# ENCODING
# ===============================
spring.messages.encoding=UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true

# ===============================
# MULTIPART (SUBIDA DE ARCHIVOS)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


upload.path=${UPLOAD_PATH}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.max.expiration.seconds=86400

# ===============================
# JWT KEYSTORE CONFIGURATION
# ===============================
jwt.keystore.path=${JWT_KEYSTORE_PATH}
jwt.keystore.password=${JWT_KEYSTORE_PASSWORD}
jwt.keystore.alias=${JWT_KEYSTORE_ALIAS:jwt-keypair}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS}
# URL base del frontend — usada por el SuccessHandler de OAuth2 para redirigir con el token JWT
frontend.url=${FRONTEND_URL:http://localhost:4200}

# ===============================
# OAUTH2 LOGIN CONFIGURATION
# ===============================
# GOOGLE: Valores vinculados dinámicamente al .env por seguridad
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# FACEBOOK: valores enlazados dinámicamente al .env por seguridad
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
# IMPORTANTE TFG: A diferencia de Google, Facebook no tiene proveedor predefinido en Spring.
# Hay que declarar las URIs del protocolo OAuth2 manualmente.
# user-info-uri necesita 'fields' explícitos porque la Graph API /me no devuelve el email por defecto.
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email,first_name,last_name
# Facebook identifica usuarios por 'id', no por 'email' ni 'sub' como Google
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

# ===============================
# SPRING MAIL (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true