spring.application.name=AxisGarage

# ── BASE DE DATOS ─────────────────────────────────────────────────────────────
# Todos los valores sensibles se cargan desde el .env mediante DotenvConfig,
# para no exponer credenciales en este fichero (que sí va a Git).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ── JPA / HIBERNATE ──────────────────────────────────────────────────────────
# none: Hibernate NO toca el esquema — lo gestionamos manualmente con schema.sql
spring.jpa.hibernate.ddl-auto=none
# Dialecto específico para MariaDB (necesario para que Hibernate genere SQL compatible)
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# Convierte camelCase de las entidades Java a snake_case en la BD (ej: pricePerDay → price_per_day)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Muestra el SQL generado en la consola — útil en desarrollo, desactivar en producción
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── INICIALIZACIÓN DE BD ─────────────────────────────────────────────────────
# never: no ejecutar data.sql automáticamente (la BD ya tiene datos cargados)
# Cambiar a 'always' solo en primer arranque para cargar el dataset inicial
spring.sql.init.mode=never
# Espera a que Hibernate procese las entidades antes de ejecutar scripts SQL
spring.jpa.defer-datasource-initialization=true

# ── HIKARI (POOL DE CONEXIONES) ───────────────────────────────────────────────
# Máximo de conexiones simultáneas a la BD. 10 es suficiente para un proyecto TFG.
spring.datasource.hikari.maximum-pool-size=10

# ── LOGGING ──────────────────────────────────────────────────────────────────
# DEBUG en transacciones para trazar problemas de commit/rollback durante el desarrollo
logging.level.org.springframework.jdbc.datasource.DataSourceTransactionManager=DEBUG

# ── ENCODING ─────────────────────────────────────────────────────────────────
# Forzamos UTF-8 en mensajes i18n y en las peticiones/respuestas HTTP
spring.messages.encoding=UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true

# ── MULTIPART (SUBIDA DE ARCHIVOS) ───────────────────────────────────────────
# Permite subir imágenes de vehículos y avatares de usuario hasta 10 MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Directorio físico donde se guardan los archivos subidos (configurable por entorno)
upload.path=${UPLOAD_PATH}

# ── JWT ──────────────────────────────────────────────────────────────────────
# Clave secreta legacy (se mantiene por compatibilidad; la firma real usa el keystore RSA)
jwt.secret=${JWT_SECRET}
# Tiempo máximo de validez del token en segundos (86400 = 24 horas, referencia de configuración)
jwt.max.expiration.seconds=86400
# Keystore JKS con el par de claves RSA para firmar (privada) y verificar (pública) los JWT
jwt.keystore.path=${JWT_KEYSTORE_PATH}
jwt.keystore.password=${JWT_KEYSTORE_PASSWORD}
# Alias del keypair dentro del keystore; por defecto 'jwt-keypair' si no se define en .env
jwt.keystore.alias=${JWT_KEYSTORE_ALIAS:jwt-keypair}

# ── CORS ─────────────────────────────────────────────────────────────────────
# Orígenes permitidos para peticiones cross-origin. En local: http://localhost:4200
# En producción, se sobreescribe en el .env del servidor con el dominio real.
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# ── FRONTEND ─────────────────────────────────────────────────────────────────
# URL base del frontend Angular. Se usa en:
#   - CustomOAuth2SuccessHandler: redirigir con token JWT tras login social
#   - CustomOAuth2FailureHandler: redirigir con mensaje de error
#   - UserService: construir el enlace de recuperación de contraseña en el email
frontend.url=${FRONTEND_URL:http://localhost:4200}

# ── OAUTH2 ───────────────────────────────────────────────────────────────────
# GOOGLE: credenciales del proyecto en Google Cloud Console
# Los valores reales están en el .env; nunca se hardcodean aquí
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
# Forzamos https en el redirect URI porque el proxy del centro termina SSL antes de llegar al backend
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL}/login/oauth2/code/google

# FACEBOOK: credenciales de la app en Meta for Developers
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.registration.facebook.redirect-uri=${APP_BASE_URL}/login/oauth2/code/facebook
# IMPORTANTE TFG: Facebook no tiene proveedor predefinido en Spring como Google.
# Hay que declarar manualmente todas las URIs del flujo OAuth2.
# user-info-uri necesita 'fields' explícitos porque la Graph API /me no devuelve email por defecto.
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email,first_name,last_name
# Facebook identifica al usuario por 'id' (no por 'email' ni 'sub' como Google)
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

# ── EMAIL (GMAIL SMTP) ────────────────────────────────────────────────────────
# Servidor SMTP de Gmail con STARTTLS en puerto 587
# Credenciales en .env: MAIL_USERNAME (dirección Gmail) y MAIL_PASSWORD (contraseña de aplicación)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
# Activa la autenticación SMTP y el cifrado STARTTLS (obligatorio para Gmail)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true