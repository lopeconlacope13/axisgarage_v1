<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Listado de Propietarios')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2>Propietarios</h2>

    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-bordered table-striped mt-3 shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${listPropietarios}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.apellidos}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.telefono}"></td>
            <td>
                <a th:href="@{/propietarios/edit(id=${p.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil"></i></a>
                <a th:href="@{/propietarios/delete(id=${p.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Borrar propietario?');"><i class="bi bi-trash"></i></a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/propietarios/new}" class="btn btn-success">Nuevo Propietario</a>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
