<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Formulario Reserva')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2 th:text="${reserva.id == null ? 'Nueva Reserva' : 'Editar Reserva'}"></h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/reservas/insert}" th:object="${reserva}" method="post" class="card p-4 shadow-sm mt-3">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label fw-bold">Casa Rural:</label>
            <select th:field="*{casaRural}" class="form-select" required>
                <option value="">-- Seleccionar Casa --</option>
                <option th:each="c : ${listaCasas}" th:value="${c.id}"
                        th:text="${c.nombre} + ' (' + ${c.precioNoche} + '€/n)'"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Huésped:</label>
            <select th:field="*{huesped}" class="form-select" required>
                <option value="">-- Seleccionar Huésped --</option>
                <option th:each="h : ${listaHuespedes}" th:value="${h.id}"
                        th:text="${h.nombre} + ' ' + ${h.apellidos}"></option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha Entrada:</label>
                <input type="date" th:field="*{fechaEntrada}" class="form-control" required />
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha Salida:</label>
                <input type="date" th:field="*{fechaSalida}" class="form-control" required />
            </div>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/reservas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
