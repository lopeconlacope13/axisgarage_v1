<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('LopeBnB - Inicio')"></head>
<body style="background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
             url('https://maderaymiel.com/wp-content/uploads/2023/08/MADERA-Y-MIEL-0018.jpg');
             background-size: cover;
             background-position: center;
             background-attachment: fixed;">

<header th:replace="fragments/header :: header"></header>

<section class="d-flex flex-column justify-content-center align-items-center min-vh-100 text-white text-center">
    <div class="p-5 rounded" style="background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(3px); max-width: 800px;">
        <h1 class="display-3 fw-bold mb-3">🏡 Bienvenido a LopeBnB</h1>
        <p class="lead fs-4 mb-4">La gestión integral de alojamientos rurales líder en España.</p>

        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/casas}" class="btn btn-warning btn-lg fw-bold px-4">
                <i class="bi bi-house-door"></i> Ver Casas
            </a>
            <a th:href="@{/reservas/new}" class="btn btn-success btn-lg fw-bold px-4">
                <i class="bi bi-calendar-plus"></i> Reservar Ahora
            </a>
        </div>
    </div>

    <div class="mt-5 animate-bounce">
        <a href="#dashboard" class="text-white fs-1"><i class="bi bi-chevron-down"></i></a>
    </div>
</section>

<section id="dashboard" class="bg-light py-5">
    <div class="container">

        <div class="mb-4 text-center">
            <h2 class="display-6 fw-bold text-dark">Panel de Control</h2>
            <p class="text-muted">Estado actual del negocio</p>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card text-white bg-primary h-100 shadow border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-uppercase mb-0 opacity-75">Casas</h6>
                            <span class="h2 fw-bold" th:text="${totalCasas}">0</span>
                        </div>
                        <i class="bi bi-house-door-fill fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-success h-100 shadow border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-uppercase mb-0 opacity-75">Reservas</h6>
                            <span class="h2 fw-bold" th:text="${totalReservas}">0</span>
                        </div>
                        <i class="bi bi-calendar-check-fill fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-dark bg-warning h-100 shadow border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-uppercase mb-0 opacity-75">Huéspedes</h6>
                            <span class="h2 fw-bold" th:text="${totalHuespedes}">0</span>
                        </div>
                        <i class="bi bi-people-fill fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-info h-100 shadow border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-uppercase mb-0 opacity-75">Opiniones</h6>
                            <span class="h2 fw-bold" th:text="${totalOpiniones}">0</span>
                        </div>
                        <i class="bi bi-chat-left-text-fill fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow border-0 mb-5">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold text-secondary"><i class="bi bi-clock-history"></i> Últimas Reservas</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-secondary small text-uppercase">
                        <tr>
                            <th>ID</th>
                            <th>Entrada</th>
                            <th>Salida</th>
                            <th>Alojamiento</th>
                            <th>Cliente</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="res : ${ultimasReservas}">
                            <td class="fw-bold text-muted" th:text="'#' + ${res.id}"></td>
                            <td th:text="${res.fechaEntrada}"></td>
                            <td th:text="${res.fechaSalida}"></td>
                            <td class="fw-bold text-primary" th:text="${res.casaRural.nombre}"></td>
                            <td th:text="${res.huesped.nombre} + ' ' + ${res.huesped.apellidos}"></td>
                            <td class="fw-bold text-success" th:text="${res.importeTotal} + ' €'"></td>
                            <td>
                                <a th:href="@{/reservas/edit(id=${res.id})}" class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</section>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
