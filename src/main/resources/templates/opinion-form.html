<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Formulario Opinión')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2 th:text="${opinion.id == null ? 'Nueva Opinión' : 'Editar Opinión'}"></h2>

    <form th:action="@{/opiniones/insert}" th:object="${opinion}" method="post" class="card p-4 shadow-sm mt-3">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Casa Rural:</label>
            <select th:field="*{casaRural}" class="form-select" required>
                <option value="">-- Seleccionar Casa --</option>
                <option th:each="c : ${listaCasas}" th:value="${c.id}" th:text="${c.nombre}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Huésped:</label>
            <select th:field="*{huesped}" class="form-select" required>
                <option value="">-- Seleccionar Huésped --</option>
                <option th:each="h : ${listaHuespedes}" th:value="${h.id}"
                        th:text="${h.nombre} + ' ' + ${h.apellidos}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Puntuación:</label>
            <select th:field="*{puntuacion}" class="form-select" required>
                <option value="5">5 - Excelente</option>
                <option value="4">4 - Muy bien</option>
                <option value="3">3 - Bien</option>
                <option value="2">2 - Regular</option>
                <option value="1">1 - Mal</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Comentario:</label>
            <textarea th:field="*{comentario}" class="form-control" rows="3" maxlength="500"></textarea>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/opiniones}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
