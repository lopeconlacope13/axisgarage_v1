<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Formulario Huésped')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2 th:text="${huesped.id == null ? 'Nuevo Huésped' : 'Editar Huésped'}"></h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/huespedes/insert}" th:object="${huesped}" method="post" class="card p-4 shadow-sm mt-3">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">DNI:</label>
            <input type="text" th:field="*{dni}" class="form-control" required />
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required />
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellidos:</label>
                <input type="text" th:field="*{apellidos}" class="form-control" required />
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email:</label>
            <input type="email" th:field="*{email}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Teléfono:</label>
            <input type="text" th:field="*{telefono}" class="form-control" required />
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/huespedes}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
