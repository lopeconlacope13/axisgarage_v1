<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Formulario Casa')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2 th:text="${casa_rural.id == null ? 'Nueva Casa Rural' : 'Editar Casa Rural'}"></h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/casas/insert}" th:object="${casa_rural}" method="post" class="card p-4 shadow-sm mt-3">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Nombre:</label>
            <input type="text" th:field="*{nombre}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Dirección:</label>
            <input type="text" th:field="*{direccion}" class="form-control" required />
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Precio Noche (€):</label>
                <input type="number" step="0.01" th:field="*{precioNoche}" class="form-control" required />
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Capacidad:</label>
                <input type="number" th:field="*{capacidadPersonas}" class="form-control" />
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Propietario:</label>
            <select th:field="*{propietario}" class="form-select" required>
                <option value="">-- Seleccionar --</option>
                <option th:each="p : ${listaPropietarios}" th:value="${p.id}"
                        th:text="${p.nombre} + ' ' + ${p.apellidos}"></option>
            </select>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/casas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
