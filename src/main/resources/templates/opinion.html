<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head ('Opiniones')"></head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<main class="container mt-4 mb-4">
    <h2>Opiniones de Clientes</h2>

    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <table class="table table-bordered table-striped mt-3 shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Casa</th>
            <th>Usuario</th>
            <th>Puntuación</th>
            <th>Comentario</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="op : ${listOpiniones}">
            <td th:text="${op.casaRural.nombre}"></td>
            <td th:text="${op.huesped.nombre}"></td>
            <td>
                <span class="badge bg-warning text-dark" th:text="${op.puntuacion} + ' ⭐'"></span>
            </td>
            <td th:text="${op.comentario}"></td>
            <td>
                <a th:href="@{/opiniones/edit(id=${op.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil"></i></a>
                <a th:href="@{/opiniones/delete(id=${op.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Borrar opinión?');"><i class="bi bi-trash"></i></a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/opiniones/new}" class="btn btn-success">Nueva Opinión</a>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
